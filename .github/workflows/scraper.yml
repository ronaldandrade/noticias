# .github/workflows/scraper.yml
#
# Chama o endpoint do scraper no Render automaticamente.
#


name: Atualizar notícias

on:
  schedule:
    - cron: '0 9,15,21 * * *'   # roda às 9h, 15h e 21h (UTC) todo dia
  workflow_dispatch:              

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Chamar endpoint de atualização
        run: |
          curl -s -X POST https://noticias-skp8.onrender.com/admin/cron/atualizar \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 10
